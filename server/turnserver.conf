# =============================================================
# coturn config для Ubuntu 22.04 (Netherlands server)
# Цель: TURN relay для Russian users (WebRTC bypass)
# =============================================================

# --- Сеть ---
# Замени на публичный IP сервера
external-ip=72.56.123.8

listening-ip=0.0.0.0

# Порт 8443 — TURNS (TURN over TLS), выглядит как HTTPS-трафик.
# Высокая вероятность прохождения через DPI в РФ.
tls-listening-port=8443

# Стандартный TURN/UDP fallback (если 8443 по какой-то причине недоступен)
listening-port=3478

# --- TLS (обязательно для порта 8443) ---
# Замени на путь к своим сертификатам
cert=/etc/letsencrypt/live/avatars.labskit.ru/fullchain.pem
pkey=/etc/letsencrypt/live/avatars.labskit.ru/privkey.pem

# --- Relay диапазон (медиапорты) ---
min-port=49152
max-port=65535

# --- Аутентификация ---
# Используем static-auth-secret (lt-cred-mech)
# Next.js API генерирует временные пароли на основе этого секрета (HMAC-SHA1)
use-auth-secret
static-auth-secret=5901b73965cd8e2a860f1f0e64916a6860d53a328f8f9c344260bbfc8d1628e2

realm=avatars.labskit.ru

# --- Безопасность ---
# Запрещаем relay на приватные адреса (защита от SSRF через TURN)
no-loopback-peers
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=240.0.0.0-255.255.255.255

# --- Логирование ---
log-file=/var/log/coturn/turnserver.log
verbose

# --- Производительность ---
proc-user=turnserver
proc-group=turnserver

# Таймаут неактивных сессий (сек)
stale-nonce=3600
